version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readmission-api
    ports:
      - "8000:8000"
    volumes:
      # Mount mlruns for experiment tracking visibility from host
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: run tests inside container
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readmission-tests
    environment:
      - PYTHONPATH=/app
    command: [ "pytest", "tests/", "-v", "--tb=short" ]
    profiles:
      - test # only runs with: docker compose --profile test up
